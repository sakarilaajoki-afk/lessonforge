<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Worksheet Generator — LessonForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js" defer></script>
<style>
  .ws-layout {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 28px;
  }
  @media (max-width: 900px) { .ws-layout { grid-template-columns: 1fr; } }

  .ws-form {
    background: white;
    border: 1px solid var(--steel);
    border-radius: var(--radius-lg);
    padding: 24px;
    height: fit-content;
    position: sticky;
    top: 80px;
  }
  .ws-form h1 {
    font-family: var(--font-display);
    font-size: 22px;
    margin-bottom: 4px;
  }
  .ws-form .subtitle { color: var(--mist); font-size: 13px; margin-bottom: 20px; }

  .radio-group {
    display: grid;
    gap: 8px;
  }
  .radio-group label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--steel);
    border-radius: var(--radius-sm);
    cursor: pointer;
    background: var(--paper);
    font-weight: 500;
    font-size: 14px;
    margin: 0;
  }
  .radio-group label:has(input:checked) {
    border-color: var(--ember);
    background: var(--ember-soft);
  }
  .radio-group input[type="radio"] { margin: 2px 0 0 0; accent-color: var(--ember); }
  .radio-group .label-body { flex: 1; }
  .radio-group .label-body .title { font-weight: 600; color: var(--ink); }
  .radio-group .label-body .desc { font-size: 12px; color: var(--mist); margin-top: 2px; font-weight: 400; }
  .radio-group label:has(input:checked) .label-body .title { color: var(--ember); }

  .ws-output {
    background: white;
    border: 1px solid var(--steel);
    border-radius: var(--radius-lg);
    padding: 40px;
    min-height: 500px;
  }

  .ws-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--mist);
  }
  .ws-empty .em { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .ws-empty h2 { font-family: var(--font-display); font-size: 20px; color: var(--anvil); margin-bottom: 6px; }

  .ws-actions {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    background: var(--paper);
    border-radius: var(--radius);
    border: 1px solid var(--steel);
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .ws-actions .label {
    font-size: 12px;
    color: var(--anvil);
    font-weight: 600;
    margin-right: 4px;
  }
  .ws-actions button {
    background: white;
    border: 1px solid var(--steel);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--anvil);
    font-family: inherit;
  }
  .ws-actions button:hover { border-color: var(--ember); color: var(--ember); }
  .ws-actions button.active { background: var(--ember); color: white; border-color: var(--ember); }
  .ws-actions button.primary {
    background: var(--ember);
    color: white;
    border-color: var(--ember);
    margin-left: auto;
  }
  .ws-actions button.primary:hover { background: #b33912; }

  /* Rendered worksheet styling */
  .ws-content h1 { font-family: var(--font-display); font-size: 26px; margin-bottom: 6px; color: var(--ink); }
  .ws-content h2 { font-family: var(--font-display); font-size: 19px; margin: 22px 0 10px; color: var(--ink); border-left: 3px solid var(--ember); padding-left: 12px; }
  .ws-content h3 { font-family: var(--font-display); font-size: 15px; margin: 18px 0 6px; color: var(--anvil); }
  .ws-content p { margin-bottom: 10px; line-height: 1.65; }
  .ws-content ul, .ws-content ol { padding-left: 22px; margin-bottom: 12px; }
  .ws-content li { margin-bottom: 6px; line-height: 1.6; }
  .ws-content strong { color: var(--ink); }
  .ws-content em { color: var(--mist); }
  .ws-content hr { border: none; border-top: 1px dashed var(--steel); margin: 20px 0; }
  .ws-content blockquote { border-left: 3px solid var(--ember); padding: 8px 14px; background: var(--ember-soft); margin: 12px 0; border-radius: 0 6px 6px 0; }

  /* When student view is active, hide answer-key-onwards */
  .student-view .answer-key-hidden { display: none !important; }

  @media print {
    .nav, .ws-form, .ws-actions { display: none !important; }
    .ws-layout { grid-template-columns: 1fr; padding: 0; }
    .ws-output { border: none; padding: 0; }
    body { background: white; }
    .ws-content h2 { page-break-after: avoid; }
  }

  .error {
    background: #fee2e2;
    border: 1px solid #fecaca;
    color: #991b1b;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand-mark" style="color: inherit; text-decoration: none;">
      <svg viewBox="0 0 64 64" width="28" height="28" aria-hidden="true">
        <defs><linearGradient id="e1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#d84315"/></linearGradient></defs>
        <rect x="10" y="44" width="44" height="8" rx="1.5" fill="#1a1f36"/>
        <rect x="16" y="36" width="32" height="8" rx="1" fill="#1a1f36"/>
        <path d="M 48 36 L 56 32 L 56 40 L 48 44 Z" fill="#1a1f36"/>
        <path d="M 18 28 L 46 28 L 46 36 L 18 36 Z" fill="#3a3f51"/>
        <path d="M 32 28 L 32 36" stroke="#1a1f36" stroke-width="1"/>
        <path d="M 32 22 Q 28 16, 32 8 Q 36 16, 32 22 Z" fill="url(#e1)"/>
        <circle cx="38" cy="14" r="2" fill="#f97316" opacity="0.6"/>
        <circle cx="26" cy="18" r="1.5" fill="#f97316" opacity="0.5"/>
      </svg>
      <span>LessonForge</span>
    </a>
    <div class="nav-links">
      <a href="app.html">Lesson plans</a>
      <a href="quiz.html">Quiz</a>
      <a href="differentiation.html">Differentiation</a>
      <a href="reports.html">Reports</a>
      <a href="index.html#pricing">Pricing</a>
      <span style="color: var(--mist); font-size: 13px;" id="usage-label">—</span>
    </div>
  </div>
</nav>

<div class="ws-layout">

  <aside class="ws-form">
    <h1>🧩 Worksheet Generator</h1>
    <p class="subtitle">Print-ready student handout with worked example, questions, and answer key.</p>

    <form id="ws-form">
      <div class="field">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="e.g. Business, Maths, English" required>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="level">Level</label>
          <select id="level" required>
            <optgroup label="Primary (UK)">
              <option>Year 3 (KS2)</option>
              <option>Year 4 (KS2)</option>
              <option>Year 5 (KS2)</option>
              <option>Year 6 (KS2)</option>
            </optgroup>
            <optgroup label="Secondary (UK)">
              <option>Year 7 (KS3)</option>
              <option>Year 8 (KS3)</option>
              <option>Year 9 (KS3)</option>
              <option>Year 10 (GCSE)</option>
              <option>Year 11 (GCSE)</option>
              <option selected>Year 12 (A-Level/BTEC)</option>
              <option>Year 13 (A-Level/BTEC)</option>
            </optgroup>
            <optgroup label="Secondary (AU)">
              <option>Year 11 (HSC/VCE)</option>
              <option>Year 12 (HSC/VCE)</option>
            </optgroup>
          </select>
        </div>

        <div class="field">
          <label for="length">Length</label>
          <select id="length">
            <option value="short">30 min (short)</option>
            <option value="standard" selected>45 min (standard)</option>
            <option value="extended">60+ min (extended)</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="topic">Topic / learning focus</label>
        <textarea id="topic" rows="3" placeholder="e.g. Calculating ratio analysis — gross profit margin, operating margin, current ratio" required></textarea>
      </div>

      <div class="field">
        <label for="exam-board">Exam board / curriculum (optional)</label>
        <select id="exam-board">
          <option value="">— Not specified —</option>
          <option>AQA</option>
          <option>Pearson Edexcel</option>
          <option>OCR</option>
          <option>WJEC</option>
          <option>CCEA</option>
          <option>Scottish CfE</option>
          <option>ACARA (AU national)</option>
          <option>NSW Syllabus (HSC)</option>
          <option>VIC VCE</option>
          <option>IB MYP / DP</option>
          <option>IGCSE / Cambridge</option>
        </select>
      </div>

      <div class="field">
        <label>Activity type</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="activity" value="practice" checked>
            <span class="label-body">
              <span class="title">Practice</span>
              <span class="desc">Consolidate understanding after a taught lesson</span>
            </span>
          </label>
          <label>
            <input type="radio" name="activity" value="investigation">
            <span class="label-body">
              <span class="title">Investigation</span>
              <span class="desc">Explore a concept via an inquiry task</span>
            </span>
          </label>
          <label>
            <input type="radio" name="activity" value="revision">
            <span class="label-body">
              <span class="title">Revision</span>
              <span class="desc">Mixed question types for upcoming assessment</span>
            </span>
          </label>
          <label>
            <input type="radio" name="activity" value="homework">
            <span class="label-body">
              <span class="title">Homework</span>
              <span class="desc">Independent task, no teacher support needed</span>
            </span>
          </label>
        </div>
      </div>

      <button type="submit" class="generate-btn" id="ws-btn">
        ⚒️ Forge the worksheet
      </button>
      <p style="font-size: 12px; color: var(--mist); margin-top: 12px; text-align: center;">
        Takes 20–30 seconds.
      </p>
    </form>
  </aside>

  <main class="ws-output" id="ws-output">
    <div class="ws-empty">
      <div class="em">🧩</div>
      <h2>Your worksheet will appear here</h2>
      <p>Student handout + answer key + teacher notes — all in one.</p>
    </div>
  </main>

</div>

<script>
// ============================================================
// Usage tracking
// ============================================================
const USAGE_KEY = 'lessonforge-worksheet-usage-v1';
const FREE_LIMIT = 5;

function getUsage() {
  const stored = localStorage.getItem(USAGE_KEY);
  const month = new Date().toISOString().slice(0, 7);
  if (!stored) return { month, count: 0 };
  const parsed = JSON.parse(stored);
  if (parsed.month !== month) return { month, count: 0 };
  return parsed;
}
function bumpUsage() {
  const u = getUsage();
  u.count++;
  localStorage.setItem(USAGE_KEY, JSON.stringify(u));
  renderUsage();
}
function renderUsage() {
  const u = getUsage();
  const remaining = Math.max(0, FREE_LIMIT - u.count);
  const el = document.getElementById('usage-label');
  if (el) el.textContent = `${remaining} of ${FREE_LIMIT} free this month`;
}
renderUsage();

// ============================================================
// Form submission
// ============================================================
const form = document.getElementById('ws-form');
const output = document.getElementById('ws-output');
const btn = document.getElementById('ws-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const u = getUsage();
  if (u.count >= FREE_LIMIT) {
    output.innerHTML = `
      <div class="ws-empty">
        <div class="em">🔒</div>
        <h2>Free limit reached</h2>
        <p style="max-width: 360px; margin: 12px auto;">You've used all ${FREE_LIMIT} free worksheets this month. Upgrade to Pro for unlimited.</p>
        <a href="index.html#pricing" class="btn btn-primary" style="display: inline-block; margin-top: 16px;">See Pro</a>
      </div>`;
    return;
  }

  const activity = document.querySelector('input[name="activity"]:checked')?.value;
  const payload = {
    subject: document.getElementById('subject').value.trim(),
    level: document.getElementById('level').value,
    topic: document.getElementById('topic').value.trim(),
    examBoard: document.getElementById('exam-board').value,
    activityType: activity,
    length: document.getElementById('length').value,
  };

  btn.disabled = true;
  btn.textContent = '⚒️ Forging...';

  output.innerHTML = `
    <div class="ws-empty">
      <div class="em" style="animation: spin 1s linear infinite;">⚒️</div>
      <h2>Hammering it out...</h2>
      <p style="color: var(--mist); margin-top: 8px;">This takes 20–30 seconds.</p>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  `;

  try {
    const res = await fetch('/.netlify/functions/generate-worksheet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(await res.text());
    const result = await res.json();
    renderWorksheet(result.worksheet);
    bumpUsage();
  } catch (err) {
    output.innerHTML = `
      <div class="ws-empty">
        <div class="em">⚠️</div>
        <h2>Something went wrong</h2>
        <div class="error" style="margin-top: 12px; max-width: 500px; margin-left: auto; margin-right: auto;">${err.message}</div>
      </div>`;
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚒️ Forge the worksheet';
  }
});

function renderWorksheet(raw) {
  if (!raw) {
    output.innerHTML = `<div class="ws-empty"><h2>Empty response</h2></div>`;
    return;
  }

  const html = window.marked.parse(raw);
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const all = Array.from(doc.body.children);
  // Find where Answer Key starts (H2 containing "Answer Key")
  const akIdx = all.findIndex(el => el.tagName === 'H2' && /answer\s*key/i.test(el.textContent));

  let htmlContent;
  if (akIdx > -1) {
    const studentPortion = all.slice(0, akIdx).map(el => el.outerHTML).join('');
    const answerKeyPortion = all.slice(akIdx).map(el => el.outerHTML).join('');
    htmlContent = `<div class="ws-content">${studentPortion}<div class="answer-key-hidden">${answerKeyPortion}</div></div>`;
  } else {
    htmlContent = `<div class="ws-content">${html}</div>`;
  }

  output.innerHTML = `
    <div class="ws-actions">
      <span class="label">View:</span>
      <button class="active" onclick="setView('teacher', this)">👨‍🏫 Teacher (with key)</button>
      <button onclick="setView('student', this)">🎓 Student (no key)</button>
      <button class="primary" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
    ${htmlContent}
  `;
}

window.setView = function (view, btn) {
  const content = document.querySelector('.ws-content');
  document.querySelectorAll('.ws-actions button').forEach(b => { if (!b.classList.contains('primary')) b.classList.remove('active'); });
  btn.classList.add('active');
  if (view === 'student') content.classList.add('student-view');
  else content.classList.remove('student-view');
};
</script>

</body>
</html>
