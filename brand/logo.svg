<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Anvil + spark — the forge metaphor -->
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#d84315"/>
    </linearGradient>
  </defs>

  <!-- Anvil base -->
  <rect x="10" y="44" width="44" height="8" rx="1.5" fill="#1a1f36"/>
  <rect x="16" y="36" width="32" height="8" rx="1" fill="#1a1f36"/>

  <!-- Anvil horn -->
  <path d="M 48 36 L 56 32 L 56 40 L 48 44 Z" fill="#1a1f36"/>

  <!-- Book on top (learning metaphor) -->
  <path d="M 18 28 L 46 28 L 46 36 L 18 36 Z" fill="#3a3f51"/>
  <path d="M 32 28 L 32 36" stroke="#1a1f36" stroke-width="1"/>

  <!-- Ember / spark rising -->
  <path d="M 32 22 Q 28 16, 32 8 Q 36 16, 32 22 Z" fill="url(#ember)"/>
  <circle cx="38" cy="14" r="2" fill="#f97316" opacity="0.6"/>
  <circle cx="26" cy="18" r="1.5" fill="#f97316" opacity="0.5"/>
</svg>
